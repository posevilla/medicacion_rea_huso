workflows:
  ios-release:
    name: iOS Release Build
    environment:
      flutter: stable
      xcode: latest

    scripts:
      - name: Generate build number
        script: |
          BUILD_NUMBER=$(date +%s)
          echo "BUILD_NUMBER=$BUILD_NUMBER" >> $CM_ENV
          echo "Build number generado: $BUILD_NUMBER"

      - name: Set automatic build number
        script: |
          echo "Usando build number: $BUILD_NUMBER"
          sed -i.bak "s/version: .*/version: 1.0.1+$BUILD_NUMBER/" pubspec.yaml
          cat pubspec.yaml

      - name: Flutter clean
        script: flutter clean

      - name: Flutter pub get
        script: flutter pub get

      - name: Build iOS (signed IPA)
        script: |
          flutter build ipa --release

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        api_key: $APP_STORE_API_KEY
        key_id: $APP_STORE_KEY_ID
        issuer_id: $APP_STORE_ISSUER_ID
        submit_to_testflight: true
