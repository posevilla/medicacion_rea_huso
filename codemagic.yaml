workflows:
  ios-release:
    name: iOS Release Build
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default

    scripts:
      - name: Load App Store Connect credentials
        script: |
          keychain initialize
          app-store-connect fetch-signing-files \
            --api-key-id "$APP_STORE_KEY_ID" \
            --api-issuer-id "$APP_STORE_ISSUER_ID" \
            --api-key "$APP_STORE_API_KEY" \
            --type IOS_APP_STORE \
            --bundle-id "com.posevilla.medicacion"
          keychain add-certificates

      - name: Generate build number
        script: |
          BUILD_NUMBER=$(date +%s)
          echo "BUILD_NUMBER=$BUILD_NUMBER" >> $CM_ENV
          echo "Build number generado: $BUILD_NUMBER"

      - name: Update pubspec version
        script: |
          sed -i.bak "s/^version:.*/version: 1.0.1+$BUILD_NUMBER/" pubspec.yaml
          echo "pubspec.yaml actualizado:"
          grep version pubspec.yaml

      - name: Update iOS CFBundleVersion
        script: |
          echo "Actualizando Info.plist principal"
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD_NUMBER" ios/Runner/Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString 1.0.1" ios/Runner/Info.plist

          echo "Actualizando AppFrameworkInfo.plist"
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD_NUMBER" ios/Flutter/AppFrameworkInfo.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString 1.0.1" ios/Flutter/AppFrameworkInfo.plist

          echo "Valores finales:"
          /usr/libexec/PlistBuddy -c "Print :CFBundleVersion" ios/Runner/Info.plist
          /usr/libexec/PlistBuddy -c "Print :CFBundleVersion" ios/Flutter/AppFrameworkInfo.plist

      - name: Flutter clean
        script: flutter clean

      - name: Flutter pub get
        script: flutter pub get

      - name: Build iOS (signed IPA)
        script: |
          flutter build ipa \
            --release \
            --build-number=$BUILD_NUMBER \
            --build-name=1.0.1 \
            --export-options-plist=ExportOptions.plist

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        api_key: $APP_STORE_API_KEY
        key_id: $APP_STORE_KEY_ID
        issuer_id: $APP_STORE_ISSUER_ID
        submit_to_testflight: true
